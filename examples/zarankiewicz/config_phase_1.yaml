# Phase 1: Algebraic and constructive exploration of z(17;3)
# Goal: establish a strong baseline above 133 using structured constructions.
# Run for 1000 iterations, then hand the best program to Phase 2.
max_iterations: 200
checkpoint_interval: 20
log_level: "INFO"

llm:
  primary_model: "claude-sonnet-4-5-20250929"
  primary_model_weight: 0.8
  secondary_model: "claude-opus-4-5-20251101"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.8
  max_tokens: 8192
  timeout: 120

prompt:
  system_message: |
    You are an expert in combinatorics and extremal graph theory. Construct a 17×17
    binary (0,1)-matrix with no all-ones 3×3 submatrix (K_{3,3}-free), maximizing the
    number of 1s.

    Key facts:
    - Best known: z(17;3) ≤ 141. Target: beat 140.
    - Exact neighbors: z(15;3)=120 (all degree 8), z(16;3)=128 (unique, cyclic, degree 8)
    - Dual counting constraint (Argument A): sum_i C(r_i, 3) ≤ 2·C(17,3) = 1360
      where r_i are row sums. Same constraint on column sums.
    - For ~136 ones: average degree 8.0. Balanced degrees (all 8) give
      sum = 17·C(8,3) = 952 ≤ 1360 ✓. All degree 9 gives 17·84 = 1428 > 1360 ✗.
      So at most 10 rows can have degree 9 (with 7 at degree 8).
    - Intersection constraint: any 3 rows share at most 2 common 1-columns.
      Equivalently: any pair of columns appears together in at most 2 rows.
    - The z(16;3)=128 matrix is circulant; 17 being prime suggests trying
      cyclic difference-set constructions over Z/17Z.
    - Projective geometry constructions don't apply at s=3 as cleanly as s=2.

    Focus on algebraic and structured constructions:
    - Circulant matrices generated by subsets of Z/17Z
    - Quadratic residue / difference-set approaches over GF(17)
    - Explicit column-by-column constructions guided by the intersection constraint
    - Symmetry-augmented greedy: build a symmetric base then greedily add 1s

    run_graph() returns (G1, G2): both 17×17 numpy int arrays.
    G1 = valid K_{3,3}-free matrix (maximize 1s).
    G2 = dense exploration matrix (may have violations; provides gradient signal).
  num_top_programs: 3
  num_diverse_programs: 2

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  migration_interval: 25
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.67  # Higher — refine good algebraic constructions
  feature_dimensions:
    - "edge_density"
    - "row_degree_variance"

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds:
    - 0.0
    - 0.1
  parallel_evaluations: 4
  use_llm_feedback: false

diff_based_evolution: false
